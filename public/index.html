<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kanban</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Gerenciamento de Tarefas</h1>
    <nav>
        <a href="cadastro-usuario.html">Cadastro de Usuários</a>
        <a href="cadastro-tarefa.html">Cadastro de Tarefas</a>
        <a href="index.html">Gerenciar Tarefas</a>
    </nav>
</header>

<div class="container">

    <h2>Tarefas</h2>

    <div class="kanban">
        <div id="afazer" class="coluna"><h3>A Fazer</h3></div>
        <div id="fazendo" class="coluna"><h3>Fazendo</h3></div>
        <div id="pronto" class="coluna"><h3>Pronto</h3></div>
    </div>

</div>

<script>
async function carregar() {
    const res = await fetch('/api/tarefas');
    const tarefas = await res.json();

    afazer.innerHTML = "<h3>A Fazer</h3>";
    fazendo.innerHTML = "<h3>Fazendo</h3>";
    pronto.innerHTML = "<h3>Pronto</h3>";

    tarefas.forEach(t => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
            <b>Descrição:</b> ${t.descricao}<br>
            <b>Setor:</b> ${t.setor}<br>
            <b>Prioridade:</b> ${t.prioridade}<br>
            <b>Vinculado a:</b> ${t.id_usuario}<br>

            <button onclick="editar(${t.id})">Editar</button>
            <button onclick="excluir(${t.id})">Excluir</button><br>

            <select onchange="mudar(${t.id}, this.value)">
                <option>A Fazer</option>
                <option>Fazendo</option>
                <option>Pronto</option>
            </select>
        `;

        if (t.status === "a fazer") afazer.appendChild(card);
        else if (t.status === "fazendo") fazendo.appendChild(card);
        else pronto.appendChild(card);
    });
}

async function mudar(id, status) {
    await fetch(`/api/tarefas/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: status.toLowerCase() })
    });
    carregar();
}

async function excluir(id) {
    if (!confirm("Excluir tarefa?")) return;

    await fetch(`/api/tarefas/${id}`, {
        method: 'DELETE'
    });

    carregar();
}

async function editar(id) {
    const desc = prompt("Nova descrição:");
    if (!desc) return;

    await fetch(`/api/tarefas/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ descricao: desc })
    });

    carregar();
}

carregar();
</script>

</body>
</html>
