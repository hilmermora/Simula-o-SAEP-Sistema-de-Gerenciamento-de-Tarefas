<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro de Tarefas</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Gerenciamento de Tarefas</h1>
    <nav>
        <a href="cadastro-usuario.html">Cadastro de Usuários</a>
        <a href="cadastro-tarefa.html">Cadastro de Tarefas</a>
        <a href="index.html">Gerenciar Tarefas</a>
    </nav>
</header>

<div class="container">
    <h2>Cadastro de Tarefas</h2>

    <form id="formTarefa">

        Descrição:
        <input type="text" id="descricao" required>

        Setor:
        <input type="text" id="setor" required>

        Usuário:
        <select id="usuario"></select>

        Prioridade:
        <select id="prioridade">
            <option value="baixa">Baixa</option>
            <option value="media">Média</option>
            <option value="alta">Alta</option>
        </select>

        <button type="submit">Cadastrar</button>
    </form>
</div>

<script>
async function carregarUsuarios() {
    const res = await fetch('/api/usuarios');
    const usuarios = await res.json();

    usuarios.forEach(u => {
        usuario.innerHTML += `<option value="${u.id}">${u.nome}</option>`;
    });
}

carregarUsuarios();

formTarefa.addEventListener('submit', async e => {
    e.preventDefault();

    await fetch('/api/tarefas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            id_usuario: usuario.value,
            descricao: descricao.value,
            setor: setor.value,
            prioridade: prioridade.value
        })
    });

    alert("Tarefa cadastrada!");
});
</script>

</body>
</html>
