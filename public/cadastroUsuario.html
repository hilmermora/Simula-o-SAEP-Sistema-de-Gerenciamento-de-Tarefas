<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro de Usuários</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Gerenciamento de Tarefas</h1>
    <nav>
        <a href="cadastro-usuario.html">Cadastro de Usuários</a>
        <a href="cadastro-tarefa.html">Cadastro de Tarefas</a>
        <a href="index.html">Gerenciar Tarefas</a>
    </nav>
</header>

<div class="container">
    <h2>Cadastro de Usuários</h2>

    <form id="formUsuario">
        Nome:
        <input type="text" id="nome" required>

        Email:
        <input type="email" id="email" required>

        <button type="submit">Cadastrar</button>
    </form>

    <p id="msg"></p>
</div>

<script>
document.getElementById('formUsuario').addEventListener('submit', async e => {
    e.preventDefault();

    const nome = nomeInput = document.getElementById('nome').value;
    const email = document.getElementById('email').value;

    const res = await fetch('/api/usuarios', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, email })
    });

    document.getElementById('msg').innerText = "Usuário cadastrado!";
});
</script>

</body>
</html>
